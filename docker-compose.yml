services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      LIMON_DEBUG: "true"
      LIMON_DATABASE_URL: sqlite+aiosqlite:///./data/limon.db
      LIMON_CORS_ORIGINS: '["*"]'
      LIMON_S3_ENDPOINT_URL: http://minio:9000
      LIMON_S3_ACCESS_KEY: minioadmin
      LIMON_S3_SECRET_KEY: minioadmin
      LIMON_S3_BUCKET: limon
    volumes:
      - limon-data:/app/data
    depends_on:
      - minio

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/limon
      "

volumes:
  limon-data:
  minio-data:
